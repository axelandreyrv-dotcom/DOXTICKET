services:
  app:
    build:
      context: .
      target: runtime
    image: doxticket/app:local
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
    networks:
      - doxticket

  web:
    image: nginx:1.29-alpine
    depends_on:
      - app
    ports:
      - "${DOXTICKET_HTTP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - doxticket

  worker:
    image: doxticket/app:local
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./:/var/www/html
    networks:
      - doxticket

  scheduler:
    image: doxticket/app:local
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    networks:
      - doxticket

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-doxticket}
      POSTGRES_USER: ${DB_USERNAME:-doxticket}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-doxticket} -d ${DB_DATABASE:-doxticket}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doxticket

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doxticket

volumes:
  postgres-data:
  redis-data:

networks:
  doxticket:
    driver: bridge
