services:
  app:
    build:
      context: .
      target: runtime
    image: doxticket/app:local
    env_file:
      - path: .env.docker
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - doxticket

  web:
    build:
      context: .
      target: web
    image: doxticket/web:local
    depends_on:
      - app
    ports:
      - "${DOXTICKET_HTTP_PORT:-8080}:80"
    networks:
      - doxticket

  worker:
    image: doxticket/app:local
    env_file:
      - path: .env.docker
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan queue:work redis --queue=default,mail --sleep=3 --tries=3 --timeout=120
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - doxticket

  scheduler:
    image: doxticket/app:local
    env_file:
      - path: .env.docker
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan schedule:work
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - doxticket

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-doxticket}
      POSTGRES_USER: ${DB_USERNAME:-doxticket}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-doxticket} -d ${DB_DATABASE:-doxticket}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doxticket

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doxticket

volumes:
  app-storage:
  app-bootstrap-cache:
  postgres-data:
  redis-data:

networks:
  doxticket:
    driver: bridge
